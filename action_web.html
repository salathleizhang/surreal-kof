<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KOF AI 动作识别</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090d;
        --surface: #10151d;
        --line: #29313e;
        --text: #f5f7fa;
        --muted: #9099a8;
        --cyan: #00d7ff;
        --orange: #ff9c2a;
        --green: #51db83;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 0%, rgba(0, 215, 255, 0.09), transparent 28rem),
          radial-gradient(circle at 92% 100%, rgba(255, 156, 42, 0.08), transparent 30rem),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 42px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .service {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .service-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 14px rgba(81, 219, 131, 0.8);
      }

      .viewer {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #030507;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
        aspect-ratio: 4 / 3;
      }

      #output {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 12px;
        text-align: center;
        color: var(--muted);
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .empty strong { color: var(--text); font-size: 18px; }
      .empty.hidden { opacity: 0; }

      .scanline {
        width: 180px;
        height: 2px;
        margin: 0 auto 8px;
        background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        box-shadow: 0 0 16px rgba(0, 215, 255, 0.55);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 16px;
      }

      .buttons { display: flex; flex-wrap: wrap; gap: 10px; }

      button {
        min-height: 42px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font: 600 14px/1 inherit;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      button:hover:not(:disabled) { transform: translateY(-1px); border-color: #4a5668; }
      button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
      button:disabled { opacity: 0.42; cursor: not-allowed; }
      button.primary { background: var(--cyan); border-color: var(--cyan); color: #001015; }
      button.danger:not(:disabled) { border-color: #65352d; color: #ffb39e; }

      .telemetry {
        color: var(--muted);
        font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: right;
      }

      .message {
        min-height: 22px;
        margin: 16px 2px 0;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error { color: #ff9c88; }

      video, #capture { display: none; }

      @media (max-width: 680px) {
        main { width: min(100% - 20px, 640px); padding-top: 22px; }
        header, .toolbar { align-items: flex-start; flex-direction: column; }
        .service { align-self: flex-start; }
        .viewer { border-radius: 12px; }
        .telemetry { text-align: left; }
        button { padding: 0 14px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>KOF AI 动作识别</h1>
          <p class="lead">摄像头由浏览器读取，识别仍在本机 Python 中完成。</p>
        </div>
        <div class="service"><span class="service-dot"></span>LOCAL ENGINE ONLINE</div>
      </header>

      <section class="viewer" aria-label="动作识别画面">
        <canvas id="output" width="640" height="480"></canvas>
        <div class="empty" id="empty">
          <span class="scanline"></span>
          <strong>摄像头尚未启动</strong>
          <span>点击下方按钮，允许 Chrome 使用摄像头</span>
        </div>
      </section>

      <div class="toolbar">
        <div class="buttons">
          <button class="primary" id="start" type="button">启动摄像头</button>
          <button class="danger" id="stop" type="button" disabled>停止</button>
          <button id="reset" type="button">计数清零</button>
        </div>
        <div class="telemetry" id="telemetry">等待启动</div>
      </div>
      <p class="message" id="message">请站在画面中央，确保肩、髋和手部清晰可见。</p>

      <video id="source" playsinline muted></video>
      <canvas id="capture" width="640" height="480"></canvas>
    </main>

    <script>
      const startButton = document.querySelector('#start');
      const stopButton = document.querySelector('#stop');
      const resetButton = document.querySelector('#reset');
      const video = document.querySelector('#source');
      const capture = document.querySelector('#capture');
      const output = document.querySelector('#output');
      const empty = document.querySelector('#empty');
      const message = document.querySelector('#message');
      const telemetry = document.querySelector('#telemetry');
      const captureContext = capture.getContext('2d', { alpha: false });
      const outputContext = output.getContext('2d', { alpha: false });

      let stream = null;
      let running = false;
      let processedFrames = 0;
      let lastPaint = performance.now();

      function setMessage(text, isError = false) {
        message.textContent = text;
        message.classList.toggle('error', isError);
      }

      function canvasBlob(canvas) {
        return new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.82));
      }

      async function pump() {
        if (!running) return;
        if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
          requestAnimationFrame(pump);
          return;
        }

        const requestStarted = performance.now();
        captureContext.drawImage(video, 0, 0, capture.width, capture.height);
        const frame = await canvasBlob(capture);
        if (!frame || !running) return;

        try {
          const response = await fetch('/api/frame', {
            method: 'POST',
            headers: { 'Content-Type': 'image/jpeg' },
            body: frame,
            cache: 'no-store',
          });
          if (!response.ok) {
            const detail = await response.json().catch(() => ({}));
            throw new Error(detail.error || `服务返回 ${response.status}`);
          }

          const bitmap = await createImageBitmap(await response.blob());
          outputContext.drawImage(bitmap, 0, 0, output.width, output.height);
          bitmap.close();
          empty.classList.add('hidden');
          processedFrames += 1;

          const now = performance.now();
          const browserFps = 1000 / Math.max(now - lastPaint, 1);
          const engineFps = response.headers.get('X-Recognition-FPS') || '--';
          telemetry.textContent = `网页 ${browserFps.toFixed(1)} FPS · 识别 ${engineFps} FPS · ${Math.round(now - requestStarted)} ms`;
          lastPaint = now;
          setMessage('识别中：竖中指 / 肘击 / 铁山靠');
        } catch (error) {
          setMessage(`处理失败：${error.message}`, true);
          await stopCamera();
          return;
        }

        requestAnimationFrame(pump);
      }

      async function startCamera() {
        if (running) return;
        if (!navigator.mediaDevices?.getUserMedia) {
          setMessage('当前浏览器不支持摄像头访问，请使用最新版 Chrome。', true);
          return;
        }

        startButton.disabled = true;
        setMessage('正在请求摄像头权限…');
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              width: { ideal: 640 },
              height: { ideal: 480 },
              facingMode: 'user',
            },
          });
          video.srcObject = stream;
          await video.play();
          running = true;
          processedFrames = 0;
          lastPaint = performance.now();
          stopButton.disabled = false;
          telemetry.textContent = '摄像头已连接，正在预热模型';
          requestAnimationFrame(pump);
        } catch (error) {
          startButton.disabled = false;
          setMessage(`无法打开摄像头：${error.message}`, true);
        }
      }

      async function stopCamera() {
        running = false;
        stream?.getTracks().forEach((track) => track.stop());
        stream = null;
        video.srcObject = null;
        startButton.disabled = false;
        stopButton.disabled = true;
        telemetry.textContent = processedFrames ? `已停止 · 共处理 ${processedFrames} 帧` : '等待启动';
        setMessage('已停止。再次启动时浏览器会继续使用已授予的权限。');
      }

      async function resetCounts() {
        try {
          const response = await fetch('/api/reset', { method: 'POST' });
          if (!response.ok) throw new Error(`服务返回 ${response.status}`);
          setMessage('三个动作的计数已清零。');
        } catch (error) {
          setMessage(`清零失败：${error.message}`, true);
        }
      }

      startButton.addEventListener('click', startCamera);
      stopButton.addEventListener('click', stopCamera);
      resetButton.addEventListener('click', resetCounts);
      window.addEventListener('pagehide', stopCamera);
    </script>
  </body>
</html>
