<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King of Fighters — Phaser 3</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow: hidden;
        }

        #game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;

        /* Keep the Phaser canvas crisp when the pixel art is scaled up. */
        #game canvas {
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
